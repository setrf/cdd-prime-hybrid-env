# PRIME-RL template config for cdd-hybrid (adapt to current prime-rl schema).
# Use this as a starting point and validate with:
#   uv run prime-rl --help
#   uv run prime-rl @ configs/prime-rl/cdd_hybrid.toml --dry-run

[run]
name = "cdd-hybrid-lora"
seed = 42

[environment]
env_id = "cdd-hybrid"

[environment.env_args]
dataset_path = "data/processed/train.jsonl"
eval_dataset_path = "data/processed/val.jsonl"

[model]
name = "Qwen/Qwen3-8B"

[training]
algorithm = "rl"
num_steps = 200
batch_size = 256
rollouts_per_example = 8
learning_rate = 0.00001

[evaluation]
enabled = true
every_n_steps = 25
num_examples = 24
rollouts_per_example = 4

[logging]
level = "info"
